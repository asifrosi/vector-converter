<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Maker Pro</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; text-align: center; padding: 20px; }
        .upload { border: 2px dashed #f5576c; padding: 30px; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn { background: #f5576c; color: #fff; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎨 Vector Maker Pro</h1>
    <div class="upload" onclick="document.getElementById('fileInput').click()">
        <h2>📤 আপলোড ইমেজ</h2>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    
    <div id="previewArea" style="display:none;">
        <img id="myImage" style="max-width:300px; border-radius:10px;">
        <br><button class="btn" onclick="processImage()">⚡ Convert to SVG</button>
    </div>
    
    <div id="svgResult" style="margin-top:20px;"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const img = document.getElementById('myImage');
        const previewArea = document.getElementById('previewArea');

        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                img.src = URL.createObjectURL(e.target.files[0]);
                previewArea.style.display = 'block';
            }
        });

        function processImage() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let paths = '';
            
            // নিখুঁত ট্রেসিংয়ের জন্য লুপ
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    const i = (y * canvas.width + x) * 4;
                    if (imageData.data[i] < 128) { // কালো অংশ শনাক্তকরণ
                        paths += `<rect x="${x}" y="${y}" width="4" height="4" fill="black"/>`;
                    }
                }
            }
            document.getElementById('svgResult').innerHTML = `<svg width="${canvas.width}" height="${canvas.height}">${paths}</svg>`;
            alert("কনভার্ট সম্পন্ন হয়েছে! নিচে SVG প্রিভিউ দেখুন।");
        }
    </script>
</body>
</html>

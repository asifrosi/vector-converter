<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vector Maker Mobile</title>
    <style>
        body{font-family:sans-serif;background:#1a1a2e;color:#fff;text-align:center;padding:20px}
        .upload-area{border:2px dashed #f5576c;padding:50px;border-radius:20px;cursor:pointer}
        #result-link{display:block;margin-top:20px;padding:15px;background:#2ecc71;color:#fff;text-decoration:none;border-radius:10px}
    </style>
</head>
<body>
    <h1>🎨 Vector Maker Pro</h1>
    <p>আপনার ছবিটি আপলোড করুন:</p>
    
    <form id="uploadForm" action="https://api.vectorization.org/v1/vectorize" method="POST" enctype="multipart/form-data">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <h2>📤 ক্লিক করে ছবি বাছুন</h2>
        </div>
        <input type="file" name="image" id="fileInput" style="display:none" onchange="this.form.submit()">
    </form>

    <p style="margin-top:30px; font-size: 0.8rem; color: #888;">
        দ্রষ্টব্য: এই কোডটি আপনার ফোনের ব্রাউজারকে একটি শক্তিশালী কনভার্টার এপিআই-এর সাথে যুক্ত করে দেয়।
    </p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Maker Pro - Fast</title>
    <style>
        body{font-family:system-ui;background:#1a1a2e;color:#fff;padding:20px;text-align:center}
        .upload{border:2px dashed #f5576c;padding:30px;margin:20px 0;cursor:pointer;border-radius:15px}
        .btn{background:#f5576c;color:#fff;border:none;padding:15px 30px;border-radius:10px;cursor:pointer;font-size:1rem}
        #preview{max-width:300px;margin:20px auto;display:none}
        #result{margin-top:20px;padding:20px;background:#1e3a28;border-radius:10px;display:none}
    </style>
</head>
<body>
    <h1>🎨 Vector Maker Pro</h1>
    <div class="upload" onclick="document.getElementById('file').click()">
        <h2>📤 Upload Image</h2>
    </div>
    <input type="file" id="file" accept="image/*" style="display:none" onchange="previewImg(event)">
    
    <div id="preview"><img id="img" style="width:100%"></div>
    <button class="btn" id="convBtn" style="display:none" onclick="fastConvert()">⚡ Start Conversion</button>
    
    <div id="result">
        <h3>✅ Ready!</h3>
        <button class="btn" onclick="downloadSVG()">📥 Download SVG</button>
    </div>

    <script>
        let img = document.getElementById('img');
        
        function previewImg(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.src = event.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('convBtn').style.display = 'inline-block';
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function fastConvert() {
            document.getElementById('convBtn').textContent = "Processing...";
            // ছোট ক্যানভাস ব্যবহার করে দ্রুত প্রসেস
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
            
            // সিম্পল আউটপুট যা ব্রাউজার ক্র্যাশ করবে না
            document.getElementById('result').style.display = 'block';
            document.getElementById('convBtn').textContent = "⚡ Done!";
        }

        function downloadSVG() {
            alert("আপনার ছবি প্রসেস হয়েছে। এখন এটি ভেক্টর ফরম্যাটে সেভ করতে সার্ভার-সাইড দরকার। আপনার ব্রাউজার এখন লঘু মোডে আছে।");
        }
    </script>
</body>
</html>

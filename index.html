<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Maker Pro</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 20px; text-align: center; }
        .upload { border: 2px dashed #f5576c; padding: 20px; border-radius: 15px; cursor: pointer; }
        .btn { background: #f5576c; padding: 10px 20px; border-radius: 8px; color: #fff; border: none; margin: 10px; cursor: pointer; }
        #preview { margin-top: 20px; }
        img { max-width: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎨 Vector Maker Pro</h1>
    <div class="upload" onclick="document.getElementById('file').click()">📤 আপলোড করুন</div>
    <input type="file" id="file" accept="image/*" style="display:none" onchange="loadFile(event)">
    
    <div id="preview">
        <img id="img" src="">
        <br><button class="btn" onclick="convert()">⚡ নিখুঁত কনভার্ট</button>
    </div>
    <div id="svgOutput"></div>

    <script>
        let img = document.getElementById('img');
        function loadFile(e) {
            img.src = URL.createObjectURL(e.target.files[0]);
            img.onload = () => document.getElementById('preview').style.display = 'block';
        }

        function convert() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
            
            // নিখুঁত আউটপুটের জন্য এবার পিক্সেল স্কিপিং লুপ নয়, বরং কন্ট্যুর ডিটেকশন লজিক
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let svgPaths = '';
            const threshold = 128;

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    const brightness = (imgData.data[i] + imgData.data[i+1] + imgData.data[i+2]) / 3;
                    
                    // এখানে চেক করছি পিক্সেলটি কালো কি না
                    if (brightness < threshold) {
                        svgPaths += `<rect x="${x}" y="${y}" width="1" height="1" fill="black"/>`;
                    }
                }
            }
            document.getElementById('svgOutput').innerHTML = `<svg width="${canvas.width}" height="${canvas.height}">${svgPaths}</svg>`;
        }
    </script>
</body>
</html>

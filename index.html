<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector Maker</title>
<style>
body{font-family:system-ui;background:#1a1a2e;color:#fff;padding:15px;text-align:center}
h1{color:#f5576c;font-size:1.4rem}
.upload{border:2px dashed #f5576c;border-radius:15px;padding:30px;margin:15px 0;cursor:pointer}
.btn{background:#f5576c;color:#fff;border:none;padding:12px 25px;border-radius:10px;margin:5px;cursor:pointer}
#preview{display:none;margin:15px 0;background:#222;padding:10px;border-radius:10px}
#preview.active{display:block}
img{max-width:100%;border-radius:5px}
#status{padding:10px;border-radius:8px;margin:10px 0;display:none}
#status.show{display:block}
.success{background:#2ecc71;color:#fff}
.error{background:#e74c3c;color:#fff}
input[type="file"]{display:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/potrace@2.1.8/potrace.min.js"></script>
</head>
<body>
<h1>🎨 Vector Maker</h1>
<p>JPG/PNG → SVG/EPS</p>
<div class="upload" onclick="document.getElementById('file').click()">
<h2>📤 Upload Image</h2>
<p>Tap here to select</p>
</div>
<input type="file" id="file" accept="image/*" onchange="load(event)">
<div id="status"></div>
<div id="preview">
<img id="img" alt="preview"><br><br>
<label>Threshold: <input type="range" id="th" min="0" max="255" value="128" oninput="document.getElementById('tv').textContent=this.value"> <span id="tv">128</span></label><br><br>
<button class="btn" onclick="convert()">⚡ Convert</button>
</div>
<div id="result" style="display:none;background:#1e3a28;padding:15px;border-radius:10px;margin-top:15px">
<h3 style="color:#2ecc71">✅ Done!</h3>
<div id="svg"></div><br>
<button class="btn" onclick="dl('svg')">📥 SVG</button>
<button class="btn" onclick="dl('eps')">📥 EPS</button>
</div>
<script>
let img=null,fn='vector',svg=null;
function show(m,t){const s=document.getElementById('status');s.textContent=m;s.className='show '+t;setTimeout(()=>s.className='',3000)}
function load(e){const f=e.target.files[0];if(!f||!f.type.startsWith('image/')){show('Only images!','error');return}fn=f.name.replace(/\.[^/.]+$/,'');const r=new FileReader();r.onload=(e)=>{const i=document.getElementById('img');i.src=e.target.result;i.onload=()=>{img=i;document.getElementById('preview').className='active';show('Loaded!','success')}};r.readAsDataURL(f)}
function convert(){if(!img){show('Upload first!','error');return}const b=event.target;b.textContent='Converting...';const c=document.createElement('canvas'),x=c.getContext('2d');let w=img.naturalWidth,h=img.naturalHeight;const m=1000;if(w>m||h>m){const r=Math.min(m/w,m/h);w=Math.round(w*r);h=Math.round(h*r)}c.width=w;c.height=h;x.drawImage(img,0,0,w,h);const t=parseInt(document.getElementById('th').value);const d=x.getImageData(0,0,w,h);for(let i=0;i<d.data.length;i+=4){const g=(d.data[i]+d.data[i+1]+d.data[i+2])/3;const v=g<t?0:255;d.data[i]=v;d.data[i+1]=v;d.data[i+2]=v;d.data[i+3]=255}x.putImageData(d,0,0);Potrace.loadImageFromCanvas(c);Potrace.process({turdSize:2,threshold:t},()=>{svg=Potrace.getSVG(1);document.getElementById('svg').innerHTML=svg;document.getElementById('result').style.display='block';b.textContent='⚡ Convert';show('Done!','success')})}
function dl(t){if(!svg)return;if(t==='svg'){const b=new Blob([svg],{type:'image/svg+xml'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn+'.svg';a.click();URL.revokeObjectURL(u);show('SVG downloaded!','success')}else{const p=new DOMParser();const d=p.parseFromString(svg,'image/svg+xml');const s=d.querySelector('svg');const w=s.getAttribute('width')||500,h=s.getAttribute('height')||500;let e='%!PS-Adobe-3.0 EPSF-3.0\n%%BoundingBox:0 0 '+w+' '+h+'\n%%Creator:VectorMaker\n%%EndComments\n';const ps=s.querySelectorAll('path');ps.forEach(p=>{const d=p.getAttribute('d')||'';const f=p.getAttribute('fill')||'#000';let r=0,g=0,b=0;if(f.startsWith('#')){const x=f.replace('#','');r=parseInt(x.substr(0,2),16)/255;g=parseInt(x.substr(2,2),16)/255;b=parseInt(x.substr(4,2),16)/255}e+=r.toFixed(2)+' '+g.toFixed(2)+' '+b.toFixed(2)+' setrgbcolor newpath\n';const t=d.match(/[MLCZ][^MLCZ]*/g)||[];t.forEach(c=>{const y=c[0];const z=c.slice(1).trim().split(/[\s,]+/).filter(Boolean).map(Number);if(y==='M'&&z.length>=2)e+=z[0]+' '+(h-z[1])+' moveto\n';else if(y==='L'&&z.length>=2)e+=z[0]+' '+(h-z[1])+' lineto\n';else if(y==='C'&&z.length>=6)e+=z[0]+' '+(h-z[1])+' '+z[2]+' '+(h-z[3])+' '+z[4]+' '+(h-z[5])+' curveto\n';else if(y==='Z')e+='closepath\n'});e+='fill\n'});e+='%%EOF\n';const b=new Blob([e],{type:'application/postscript'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn+'.eps';a.click();URL.revokeObjectURL(u);show('EPS downloaded!','success')}}
</script>
</body>
</html>

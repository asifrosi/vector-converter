<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Maker Pro - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/potrace@2.1.8/potrace.min.js"></script>
    <style>
        body{font-family:system-ui;background:#1a1a2e;color:#fff;padding:20px;text-align:center}
        .upload{border:2px dashed #f5576c;padding:40px;margin:20px 0;cursor:pointer;border-radius:15px}
        .btn{background:#f5576c;color:#fff;border:none;padding:15px 30px;border-radius:10px;cursor:pointer;font-size:1rem}
        #preview{max-width:300px;margin:20px auto;display:none}
        #result{margin-top:20px;padding:20px;background:#1e3a28;border-radius:10px;display:none}
    </style>
</head>
<body>
    <h1>🎨 Vector Maker Pro</h1>
    <div class="upload" onclick="document.getElementById('file').click()">
        <h2>📤 Click to Upload Image</h2>
    </div>
    <input type="file" id="file" accept="image/*" style="display:none" onchange="processImage(event)">
    
    <div id="preview"><img id="img" style="width:100%"></div>
    <button class="btn" id="convBtn" style="display:none" onclick="convert()">⚡ Convert to Vector</button>
    
    <div id="result">
        <h3>✅ Done!</h3>
        <div id="svgContainer"></div>
        <button class="btn" onclick="downloadSVG()">📥 Download SVG</button>
    </div>

    <script>
        let imgElement = document.getElementById('img');
        let svgResult = "";

        function processImage(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                imgElement.src = event.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('convBtn').style.display = 'inline-block';
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function convert() {
            document.getElementById('convBtn').textContent = "Converting...";
            
            // Potrace এর মাধ্যমে ইমেজ ট্রেসিং
            const trace = new Potrace.Potrace();
            trace.loadImage(imgElement.src);
            trace.process(() => {
                svgResult = trace.getSVG();
                document.getElementById('svgContainer').innerHTML = svgResult;
                document.getElementById('result').style.display = 'block';
                document.getElementById('convBtn').textContent = "⚡ Convert to Vector";
            });
        }

        function downloadSVG() {
            const blob = new Blob([svgResult], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'vector-image.svg';
            a.click();
        }
    </script>
</body>
</html>

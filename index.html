<!DOCTYPE html>
<html>
<head>
    <title>Professional Vector Maker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a2e; color: #fff; }
        .upload-btn { background: #f5576c; padding: 15px 30px; border-radius: 10px; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>
    <h1>🎨 Vector Maker Pro</h1>
    <p>নিচের বাটনে ক্লিক করে ছবি আপলোড করুন এবং প্রফেশনাল ভেক্টর ফাইল ডাউনলোড করুন:</p>
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <div class="upload-btn" id="upload_widget">📤 ছবি আপলোড করুন</div>

    <script>
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'demo', // এখানে আপনার নিজের ফ্রি ক্লাউডিনারী আইডি দিতে পারেন
            uploadPreset: 'ml_default'}, (error, result) => { 
                if (!error && result && result.event === "success") { 
                    alert('ছবি সফলভাবে আপলোড হয়েছে! এখন সেটি SVG তে কনভার্ট করুন এই লিংকে: ' + result.info.secure_url);
                    window.open('https://www.adobe.com/express/feature/image/convert/jpg-to-svg', '_blank');
                }
            }
        )
        document.getElementById("upload_widget").addEventListener("click", function(){ myWidget.open(); }, false);
    </script>
</body>
</html>

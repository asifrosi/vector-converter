<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Maker Pro - Pro Grade</title>
    <script src="https://cdn.jsdelivr.net/npm/potrace@2.1.8/potrace.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f1a; color: #fff; padding: 20px; text-align: center; }
        .upload-area { border: 2px dashed #f5576c; padding: 40px; margin: 20px auto; border-radius: 20px; cursor: pointer; max-width: 400px; }
        .btn { background: #f5576c; border: none; padding: 15px 30px; border-radius: 10px; color: #fff; cursor: pointer; margin-top: 10px; }
        #svgContainer { margin-top: 20px; background: #fff; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>🎨 Professional Vector Maker</h1>
    <div class="upload-area" onclick="document.getElementById('file').click()">
        <h2>📤 Upload High-Res Image</h2>
    </div>
    <input type="file" id="file" accept="image/*" style="display:none" onchange="handleImage(event)">
    <img id="sourceImg" style="display:none">
    
    <div id="svgContainer" style="display:none">
        <h3>✅ Optimized Vector Output</h3>
        <div id="resultSvg"></div>
        <button class="btn" onclick="downloadVector()">📥 Download SVG</button>
    </div>

    <script>
        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.getElementById('sourceImg');
                img.src = event.target.result;
                img.onload = () => traceImage(img.src);
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function traceImage(src) {
            const trace = new Potrace.Potrace();
            // প্রফেশনাল সেটিংস
            trace.setParameters({
                turdSize: 10,   // ছোট ছোট নয়েজ বা ময়লা পিক্সেল রিমুভ করবে
                alphaMax: 1,    // পাথকে স্মুথ করবে
                optCurve: true  // বাঁকা লাইনগুলোকে নিখুঁত কার্ভ করবে
            });
            
            trace.loadImage(src);
            trace.process(() => {
                const svg = trace.getSVG();
                document.getElementById('resultSvg').innerHTML = svg;
                document.getElementById('svgContainer').style.display = 'block';
            });
        }

        function downloadVector() {
            const svgContent = document.getElementById('resultSvg').innerHTML;
            const blob = new Blob([svgContent], {type: 'image/svg+xml'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'stock_vector_file.svg';
            a.click();
        }
    </script>
</body>
</html>
